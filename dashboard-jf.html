<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonjour Jean-François</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Roboto+Condensed:wght@300;400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--surface3:#21262d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#1565c0;--blue-light:#4fb3ff;
  --orange-light:#ffb74d;--green-light:#4ade80;
  --yellow:#f0c040;--red:#cc0000;
  --lcn-blue:#003087;--lcn-red:#e30613;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Roboto',sans-serif;}
.tv-wrapper{display:flex;flex-direction:column;height:100vh;}

/* ═══ HEADER ═══ */
.tv-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 0;flex-shrink:0;height:56px;}
.greeting h1{font-family:'Oswald',sans-serif;font-size:34px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:linear-gradient(90deg,#fff 0%,var(--blue-light) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.date-str{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
.clock{font-family:'Oswald',sans-serif;font-size:44px;font-weight:300;letter-spacing:.06em;}
.clock .sec{font-size:28px;color:var(--blue-light);opacity:.8;}

/* ═══ SCORES BAR ═══ */
.scores-bar{display:flex;align-items:stretch;margin:5px 8px;background:#111;border:1px solid #222;border-radius:8px;overflow:hidden;flex-shrink:0;height:52px;}
.scores-label{background:var(--red);color:#fff;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;padding:0 12px;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;}
.scores-items{display:flex;align-items:stretch;flex:1;overflow:hidden;}

.score-slot{flex:1;border-right:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.score-slot:last-child{border-right:none;}

.slot-state{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;gap:6px;padding:0 8px;opacity:0;transition:opacity .6s ease;}
.slot-state.visible{opacity:1;}

/* Logo équipe */
.ss-logo{width:32px;height:32px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));}

.ss-info{display:flex;flex-direction:column;flex:1;min-width:0;}
.ss-top{display:flex;align-items:center;gap:5px;}
.ss-tag{font-size:8px;font-family:'Roboto Condensed',sans-serif;font-weight:700;letter-spacing:.08em;padding:1px 4px;border-radius:2px;text-transform:uppercase;flex-shrink:0;}
.tag-last2{background:rgba(139,148,158,.12);color:#8b949e;border:1px solid rgba(139,148,158,.2);}
.tag-last1{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2);}
.tag-next{background:rgba(79,179,255,.15);color:#4fb3ff;border:1px solid rgba(79,179,255,.2);}
.tag-live{background:rgba(204,0,0,.3);color:#ff4444;border:1px solid rgba(204,0,0,.4);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.ss-vs{font-family:'Roboto Condensed',sans-serif;font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ss-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.ss-score{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;line-height:1;}
.ss-score.win{color:var(--green-light);}
.ss-score.loss{color:#ff6b6b;}
.ss-score.next{color:var(--blue-light);font-size:14px;}
.ss-meta{font-size:9px;color:#444;font-family:'Roboto Condensed',sans-serif;white-space:nowrap;}

.slot-dots{position:absolute;bottom:3px;right:5px;display:flex;gap:3px;}
.slot-dot{width:4px;height:4px;border-radius:50%;background:#2a2a2a;}
.slot-dot.active{background:var(--red);}

/* ═══ CONTENU PRINCIPAL ═══ */
.tv-content{display:grid;grid-template-columns:268px 1fr 272px;gap:8px;padding:0 8px;flex:1;min-height:0;}

/* MÉTÉO */
.meteo-col{display:flex;flex-direction:column;gap:6px;min-height:0;}
.meteo-card{background:linear-gradient(160deg,#0d1f3c 0%,#0a1628 60%,#071020 100%);border:1px solid #1a3a6b;border-radius:10px;overflow:hidden;animation:fadeUp .5s ease .1s forwards;opacity:0;display:flex;flex-direction:column;flex:1;min-height:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.m-hdr{background:var(--blue);padding:5px 10px;font-family:'Roboto Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.m-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 2s infinite;}
.m-body{padding:8px 10px;flex:1;overflow:hidden;display:flex;flex-direction:column;gap:6px;}
.m-now{display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08);}
.m-icon{font-size:46px;line-height:1;}
.m-temp{font-family:'Oswald',sans-serif;font-size:56px;font-weight:300;line-height:1;color:#fff;}
.m-temp sup{font-size:24px;color:rgba(255,255,255,.6);vertical-align:super;}
.m-desc{font-family:'Roboto Condensed',sans-serif;font-size:12px;color:#90caf9;text-transform:uppercase;letter-spacing:.04em;}
.m-feels{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}
.m-mm{font-size:10px;margin-top:2px;}
.m-hi{color:#ff8a65;}.m-lo{color:#90caf9;}
.m-stats{display:flex;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08);}
.m-stat{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.07);}
.m-stat:last-child{border-right:none;}
.m-slabel{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;}
.m-sval{font-family:'Oswald',sans-serif;font-size:15px;color:#fff;}
.m-sunit{font-size:8px;color:rgba(255,255,255,.4);}
.m-alert{background:#d32f2f;border-radius:4px;padding:4px 8px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;animation:alertpulse 2s infinite;}
@keyframes alertpulse{0%,100%{opacity:1}50%{opacity:.8}}
.sec-lbl{font-size:8px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.h-row,.fc-row{display:flex;gap:3px;}
.h-item,.fc-item{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:4px 2px;text-align:center;}
.h-time,.fc-name{font-size:8px;color:rgba(255,255,255,.45);text-transform:uppercase;}
.h-ico,.fc-ico{font-size:14px;margin:1px 0;}
.h-tmp,.fc-hi{font-family:'Oswald',sans-serif;font-size:12px;color:#fff;}
.fc-hi{color:#ff8a65;}.h-pct,.fc-lo{font-size:8px;color:#90caf9;}

.traffic-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeUp .5s ease .2s forwards;opacity:0;flex-shrink:0;}
.t-hdr{background:#1a2e1a;padding:5px 10px;font-family:'Roboto Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4ade80;display:flex;align-items:center;gap:6px;}
.t-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:blink 2s infinite;}
.t-body{padding:8px 10px;}
.t-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.t-from{font-size:10px;color:var(--muted);line-height:1.5;}
.t-from strong{color:var(--text);font-size:11px;}
.t-time{font-family:'Oswald',sans-serif;font-size:30px;font-weight:500;line-height:1;}
.t-time.g{color:#4ade80;}.t-time.y{color:var(--orange-light);}.t-time.r{color:#ff6b6b;}
.t-btm{display:flex;align-items:center;justify-content:space-between;}
.t-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;}
.t-badge.g{background:rgba(74,222,128,.15);color:#4ade80;}
.t-badge.y{background:rgba(251,140,0,.15);color:var(--orange-light);}
.t-badge.r{background:rgba(255,107,107,.15);color:#ff6b6b;}
.t-via{font-size:9px;color:var(--muted);}

/* NOUVELLES */
.news-col{display:flex;flex-direction:column;min-height:0;animation:fadeUp .5s ease .2s forwards;opacity:0;}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:1;display:flex;flex-direction:column;}
.news-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--lcn-blue);border-bottom:2px solid var(--lcn-red);flex-shrink:0;}
.news-hdr-left{display:flex;align-items:center;gap:10px;}
.news-logo{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:.05em;color:#fff;}
.news-logo span{color:var(--lcn-red);}
.news-live{font-size:9px;background:var(--lcn-red);color:#fff;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.08em;animation:blink 1.5s infinite;}
.news-time-str{font-size:11px;color:rgba(255,255,255,.6);font-family:'Roboto Condensed',sans-serif;}
.news-body{flex:1;overflow-y:auto;padding:10px 14px;}
.news-body::-webkit-scrollbar{width:3px;}
.news-body::-webkit-scrollbar-thumb{background:var(--border);}
.news-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.news-item:last-child{border-bottom:none;}
.news-cat{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;white-space:nowrap;height:fit-content;flex-shrink:0;margin-top:2px;}
.cat-qc{background:rgba(227,6,19,.2);color:#ff6b6b;border:1px solid rgba(227,6,19,.3);}
.cat-can{background:rgba(0,48,135,.3);color:#90caf9;border:1px solid rgba(0,48,135,.4);}
.cat-monde{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2);}
.cat-sport{background:rgba(240,192,64,.15);color:#f0c040;border:1px solid rgba(240,192,64,.2);}
.cat-eco{background:rgba(251,140,0,.15);color:var(--orange-light);border:1px solid rgba(251,140,0,.2);}
.news-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:3px;}
.news-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.news-age{font-size:9px;color:#444;margin-top:3px;font-family:'Roboto Condensed',sans-serif;}

/* DROITE */
.right-col{display:flex;flex-direction:column;gap:6px;min-height:0;}
.voyage-card{background:#000;border:1px solid rgba(232,197,71,.25);border-radius:10px;overflow:hidden;flex-shrink:0;animation:fadeUp .5s ease .3s forwards;opacity:0;}
.v-hdr{background:rgba(232,197,71,.15);padding:5px 10px;font-family:'Roboto Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#f0c040;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(232,197,71,.2);}
.v-dot{width:5px;height:5px;border-radius:50%;background:#f0c040;animation:blink 2s infinite;}
.v-slides{position:relative;height:118px;overflow:hidden;}
.v-slides img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s ease;filter:brightness(.65);}
.v-slides img.active{opacity:1;}
.v-overlay{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.9));display:flex;align-items:flex-end;justify-content:space-between;}
.v-name{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#f0c040;}
.v-date{font-size:9px;color:rgba(255,255,255,.65);}
.v-cnt{text-align:right;}
.v-days{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;color:#f0c040;line-height:1;}
.v-lbl{font-size:8px;color:rgba(255,255,255,.5);}
.v-bar{height:2px;background:rgba(255,255,255,.08);}
.v-fill{height:100%;background:linear-gradient(90deg,#f0c040,#ff9f40);}

.cal-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex:1;animation:fadeUp .5s ease .4s forwards;opacity:0;display:flex;flex-direction:column;}
.c-hdr{background:#1c3a5e;padding:5px 10px;font-family:'Roboto Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#90caf9;display:flex;align-items:center;gap:6px;border-bottom:1px solid #1a3a6b;flex-shrink:0;}
.c-dot{width:5px;height:5px;border-radius:50%;background:#90caf9;animation:blink 2s infinite;}
.c-body{flex:1;overflow-y:auto;padding:6px;}
.c-body::-webkit-scrollbar{width:2px;}
.c-body::-webkit-scrollbar-thumb{background:var(--border);}
.c-ev{display:flex;align-items:flex-start;gap:6px;padding:5px 7px;border-radius:5px;margin-bottom:4px;background:var(--surface2);border-left:3px solid var(--blue-light);}
.c-ev.imp{border-left-color:#f0c040;}
.c-ev.soon{border-left-color:#4ade80;}
.c-time{font-family:'Roboto Condensed',sans-serif;font-size:11px;color:var(--blue-light);min-width:32px;font-weight:700;flex-shrink:0;}
.c-title{font-size:11px;color:var(--text);line-height:1.3;}
.no-ev{text-align:center;color:var(--muted);font-size:11px;padding:12px 0;}
.gcal-box{background:var(--surface2);border:1px dashed var(--border);border-radius:6px;padding:8px;text-align:center;margin-bottom:4px;}
.gcal-box p{font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.4;}
.gcal-btn{display:inline-flex;align-items:center;gap:5px;background:#4285f4;color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:10px;font-weight:500;cursor:pointer;font-family:'Roboto',sans-serif;}

.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:5px;margin-bottom:6px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.tv-bottom-pad{height:8px;flex-shrink:0;}
</style>
</head>
<body>
<div class="tv-wrapper">

  <div class="tv-header">
    <div class="greeting">
      <h1 id="greeting-text">Bonjour, Jean-François !</h1>
      <div class="date-str" id="date-str"></div>
    </div>
    <div class="clock"><span id="clk-h">00</span>:<span id="clk-m">00</span><span class="sec">:<span id="clk-s">00</span></span></div>
  </div>

  <div class="scores-bar">
    <div class="scores-label">⚡ SCORES</div>
    <div class="scores-items" id="scores-items"></div>
  </div>

  <div class="tv-content">

    <div class="meteo-col">
      <div class="meteo-card">
        <div class="m-hdr"><span class="m-dot"></span>MÉTÉO — PRÉVOST, QC</div>
        <div class="m-body" id="meteo-content">
          <div class="skel" style="height:50px;border-radius:8px;"></div>
          <div class="skel" style="height:12px;width:80%"></div>
          <div class="skel" style="height:40px;border-radius:6px;"></div>
        </div>
      </div>
      <div class="traffic-card">
        <div class="t-hdr"><span class="t-dot"></span>🚗 CIRCULATION</div>
        <div class="t-body" id="traffic-content">
          <div class="skel" style="height:30px;border-radius:6px;"></div>
        </div>
      </div>
    </div>

    <div class="news-col">
      <div class="news-card">
        <div class="news-hdr">
          <div class="news-hdr-left">
            <div class="news-logo">L<span>C</span>N</div>
            <div class="news-live">EN DIRECT</div>
            <div style="font-size:10px;color:rgba(255,255,255,.5);font-family:'Roboto Condensed',sans-serif;margin-left:6px;">Principales nouvelles</div>
          </div>
          <div class="news-time-str" id="news-time"></div>
        </div>
        <div class="news-body" id="news-content">
          <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">📰 Chargement...</div>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="voyage-card">
        <div class="v-hdr"><span class="v-dot"></span>✈️ PROCHAIN VOYAGE</div>
        <div class="v-slides" id="v-slides"></div>
        <div class="v-bar"><div class="v-fill" id="v-fill" style="width:0%"></div></div>
      </div>
      <div class="cal-card">
        <div class="c-hdr"><span class="c-dot"></span>📅 AGENDA DU JOUR</div>
        <div class="c-body" id="cal-content">
          <div class="gcal-box" id="gcal-box">
            <p>Connecte ton Google Calendar<br>pour tes vrais événements</p>
            <button class="gcal-btn" onclick="connectGCal()">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Connecter Google Calendar
            </button>
          </div>
          <div id="events-list"></div>
        </div>
      </div>
    </div>

  </div>
  <div class="tv-bottom-pad"></div>
</div>

<script>
// ══════════════════════════════
// LOGOS OFFICIELS DES ÉQUIPES
// ══════════════════════════════
const TEAM_LOGOS = {
  // NHL
  'MTL': 'https://a.espncdn.com/i/teamlogos/nhl/500/mtl.png',
  'OTT': 'https://a.espncdn.com/i/teamlogos/nhl/500/ott.png',
  'TOR': 'https://a.espncdn.com/i/teamlogos/nhl/500/tor.png',

  'NYR': 'https://a.espncdn.com/i/teamlogos/nhl/500/nyr.png',
  'DET': 'https://a.espncdn.com/i/teamlogos/nhl/500/det.png',
  'TBL': 'https://a.espncdn.com/i/teamlogos/nhl/500/tb.png',
  'FLA': 'https://a.espncdn.com/i/teamlogos/nhl/500/fla.png',
  'CAR': 'https://a.espncdn.com/i/teamlogos/nhl/500/car.png',
  'WSH': 'https://a.espncdn.com/i/teamlogos/nhl/500/wsh.png',
  'PHI': 'https://a.espncdn.com/i/teamlogos/nhl/500/phi.png',
  'PIT': 'https://a.espncdn.com/i/teamlogos/nhl/500/pit.png',
  'CBJ': 'https://a.espncdn.com/i/teamlogos/nhl/500/cbj.png',
  'NJD': 'https://a.espncdn.com/i/teamlogos/nhl/500/njd.png',
  'NYI': 'https://a.espncdn.com/i/teamlogos/nhl/500/nyi.png',
  'BUF': 'https://a.espncdn.com/i/teamlogos/nhl/500/buf.png',
  'CHI': 'https://a.espncdn.com/i/teamlogos/nhl/500/chi.png',
  'MIN': 'https://a.espncdn.com/i/teamlogos/nhl/500/min.png',
  'STL': 'https://a.espncdn.com/i/teamlogos/nhl/500/stl.png',
  'CGY': 'https://a.espncdn.com/i/teamlogos/nhl/500/cgy.png',
  'EDM': 'https://a.espncdn.com/i/teamlogos/nhl/500/edm.png',
  'VAN': 'https://a.espncdn.com/i/teamlogos/nhl/500/van.png',
  'WPG': 'https://a.espncdn.com/i/teamlogos/nhl/500/wpg.png',
  'ANA': 'https://a.espncdn.com/i/teamlogos/nhl/500/ana.png',
  'LAK': 'https://a.espncdn.com/i/teamlogos/nhl/500/la.png',

function buildScoresBar(){
  const container=document.getElementById('scores-items');
  container.innerHTML='';
  teamSlots.forEach((team,ti)=>{
    slotIdx[team.id]=1;
    const slot=document.createElement('div');
    slot.className='score-slot';
    slot.id=`slot-${team.id}`;
    // 3 états
    for(let si=0;si<3;si++){
      const div=document.createElement('div');
      div.className='slot-state'+(si===1?' visible':'');
      div.id=`state-${team.id}-${si}`;
      div.innerHTML=renderState(team,si);
      slot.appendChild(div);
    }
    // Points
    const dots=document.createElement('div');dots.className='slot-dots';dots.id=`dots-${team.id}`;
    for(let i=0;i<3;i++){const d=document.createElement('div');d.className='slot-dot'+(i===1?' active':'');dots.appendChild(d);}
    slot.appendChild(dots);
    container.appendChild(slot);
  });
}

function rotateSlot(teamId){
  const team=teamSlots.find(t=>t.id===teamId);
  if(!team||team.states.length<3)return;
  const cur=slotIdx[teamId];
  const next=(cur+1)%3;
  document.getElementById(`state-${teamId}-${cur}`)?.classList.remove('visible');
  document.getElementById(`state-${teamId}-${next}`)?.classList.add('visible');
  document.getElementById(`dots-${teamId}`)?.querySelectorAll('.slot-dot').forEach((d,i)=>d.classList.toggle('active',i===next));
  slotIdx[teamId]=next;
}

function updateSlotStates(teamId,states){
  const team=teamSlots.find(t=>t.id===teamId);
  if(!team)return;
  team.states=states;
  for(let si=0;si<3;si++){
    const el=document.getElementById(`state-${teamId}-${si}`);
    if(el)el.innerHTML=renderState(team,si);
  }
}

function startRotations(){
  teamSlots.forEach((team,i)=>{
    setTimeout(()=>setInterval(()=>rotateSlot(team.id),4000),i*850);
  });
}

async function fetchESPN(url){try{return await(await fetch(url)).json();}catch(e){return null;}}

function parseGames(events,abbrev,now){
  const past=events.filter(e=>e.competitions?.[0]?.status?.type?.completed);
  const upcoming=events.filter(e=>!e.competitions?.[0]?.status?.type?.completed&&new Date(e.date)>=now);
  const live=events.find(e=>e.competitions?.[0]?.status?.type?.state==='in');
  const parse=(ev)=>{
    if(!ev)return null;
    const comp=ev.competitions[0];
    const home=comp.competitors.find(c=>c.homeAway==='home');
    const away=comp.competitors.find(c=>c.homeAway==='away');
    const isHome=home?.team?.abbreviation===abbrev;
    const myS=parseInt(isHome?home.score:away.score)||0;
    const opS=parseInt(isHome?away.score:home.score)||0;
    const opp=isHome?away:home;
    return{opp:opp?.team?.abbreviation||'',oppFull:opp?.team?.displayName||'',myS,opS,won:myS>opS,dt:new Date(ev.date)};
  };
  const r={live:null,last2:null,last1:null,next:null};
  if(live){const g=parse(live);if(g)r.live=g;}
  if(past.length>=2){r.last2=parse(past[past.length-2]);}
  if(past.length>=1){r.last1=parse(past[past.length-1]);}
  if(upcoming.length>=1){r.next=parse(upcoming[0]);}
  return r;
}

function makeStates(r,league){
  const fmtDate=(dt)=>dt.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
  const fmtTime=(dt)=>dt.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'});
  const logoKey=(abbrev)=>league==='NBA'?`${abbrev}-NBA`:league==='NFL'?`${abbrev}-NFL`:league==='MLB'?`${abbrev}-MLB`:abbrev;

  const s0=r.last2?{tag:'AVANT-DERNIER',tc:'tag-last2',oppLogo:logoKey(r.last2.opp),oppEmoji:'',vs:`vs ${r.last2.oppFull||r.last2.opp}`,score:`${r.last2.myS}–${r.last2.opS}`,sc:r.last2.won?'win':'loss',meta:fmtDate(r.last2.dt)}
    :{tag:'AVANT-DERNIER',tc:'tag-last2',oppLogo:'',oppEmoji:'',vs:'Données à venir',score:'—',sc:'',meta:''};
  const src=r.live||r.last1;
  const s1=src?{tag:r.live?'EN DIRECT':'DERNIER',tc:r.live?'tag-live':'tag-last1',oppLogo:logoKey(src.opp),oppEmoji:'',vs:`vs ${src.oppFull||src.opp}`,score:`${src.myS}–${src.opS}`,sc:src.won?'win':'loss',meta:r.live?'LIVE':fmtDate(src.dt)}
    :{tag:'DERNIER',tc:'tag-last1',oppLogo:'',oppEmoji:'',vs:'Données à venir',score:'—',sc:'',meta:''};
  const s2=r.next?{tag:'PROCHAIN',tc:'tag-next',oppLogo:logoKey(r.next.opp),oppEmoji:'',vs:`vs ${r.next.oppFull||r.next.opp}`,score:fmtTime(r.next.dt),sc:'next',meta:fmtDate(r.next.dt)}
    :{tag:'PROCHAIN',tc:'tag-next',oppLogo:'',oppEmoji:'',vs:'À confirmer',score:'',sc:'next',meta:''};
  return[s0,s1,s2];
}

      <div class="t-time ${cls}">${time}</div>
    </div>
    <div class="t-btm"><span class="t-badge ${cls}">${badge}</span><span class="t-via">${via}</span></div>`;
}
loadTraffic();

// ══════════════════════════════
// GOOGLE CALENDAR
// ══════════════════════════════
function connectGCal(){showDemoEvents();}
function showDemoEvents(){
  const h=new Date().getHours();
  const events=[
    {time:'07:30',title:'☕ Salut Bonjour — Helix TV',type:'imp'},
    {time:'09:00',title:'Réunion équipe — Airbus',type:''},
    {time:'12:00',title:'Dîner avec Martin',type:''},
    {time:'17:30',title:'💪 Gym',type:'soon'},
  ].filter(e=>parseInt(e.time)>=h);
  document.getElementById('gcal-box').style.display='none';
  document.getElementById('events-list').innerHTML=events.length===0
    ?'<div class="no-ev">✅ Aucun événement restant</div>'
    :events.map(e=>`<div class="c-ev ${e.type}"><span class="c-time">${e.time}</span><div class="c-title">${e.title}</div></div>`).join('');
}
(function(){if(window.location.hash.includes('access_token')){const t=window.location.hash.match(/access_token=([^&]+)/)?.[1];if(t){window.location.hash='';loadGCal(t);}}})();
async function loadGCal(token){
  try{
    const today=new Date();today.setHours(0,0,0,0);const tom=new Date(today);tom.setDate(tom.getDate()+1);
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${today.toISOString()}&timeMax=${tom.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=8`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)return;const data=await r.json();
    document.getElementById('gcal-box').style.display='none';
    const evs=data.items||[];
    if(!evs.length){document.getElementById('events-list').innerHTML='<div class="no-ev">✅ Aucun événement aujourd\'hui</div>';return;}
    document.getElementById('events-list').innerHTML=evs.map(e=>{const start=e.start?.dateTime?new Date(e.start.dateTime):null;const t=start?start.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'}):'Toute la journée';return`<div class="c-ev"><span class="c-time">${t}</span><div class="c-title">${e.summary||'Événement'}</div></div>`;}).join('');
  }catch(e){}
}
